services:
  monad-validator-monitor:
    image: ghcr.io/mictonode/micto-monad-monitor:latest
    # build: .  # Uncomment to build from source instead
    container_name: monad-validator-monitor
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./config/config.yaml:/app/config/config.yaml:ro
      - ./config/validators.yaml:/app/config/validators.yaml:ro
      - monitor-state:/app/state
    ports:
      - "8181:8181"
      - "8282:8282"
      - "8383:8383"
    environment:
      - TZ=${TZ:-UTC}
      - PYTHONUNBUFFERED=1
      - HEALTH_PORT=${HEALTH_PORT:-8181}
      - DASHBOARD_PORT=${DASHBOARD_PORT:-8282}
      - API_PORT=${API_PORT:-8383}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:-}
      - DASHBOARD_JWT_SECRET=${DASHBOARD_JWT_SECRET:-}
    depends_on:
      - prometheus
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8181/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  prometheus:
    image: prom/prometheus:latest
    container_name: monad-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - monitor-state:/etc/prometheus/targets:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  monitor-state:
  prometheus-data:
